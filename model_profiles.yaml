# Perfiles de arranque por modelo
# Cada modelo puede tener su propio modo (cpu/gpu), capas en GPU,
# tamaño de contexto, hilos y argumentos extra de llama-server.
#
# El perfil 'default' se aplica a cualquier modelo que no tenga entrada
# propia en 'profiles'.

default:
  device: gpu          # cpu | gpu
  n_gpu_layers: 999    # 0 fuerza CPU; 999 fuerza todas las capas en GPU
  ctx_size: 8192
  threads: 8
  extra_args: []
  # Ejemplo de extra_args:
  # extra_args:
  #   - "--flash-attn"
  #   - "--mlock"

profiles:
  # Ejemplo para un modelo grande que no cabe completo en la GPU
  # DeepSeek-R1-Distill-Qwen-32B-Q4_K_M.gguf:
  #   device: gpu
  #   n_gpu_layers: 60
  #   ctx_size: 4096
  #   threads: 8
  #   extra_args:
  #     - "--flash-attn"
  #     - "--mlock"
