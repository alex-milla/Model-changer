# Perfiles de arranque por modelo
# Cada modelo puede tener su propia configuración de arranque.
# El perfil 'default' se aplica a cualquier modelo que no tenga entrada
# propia en 'profiles'.

default:
  device: gpu          # cpu | gpu | auto
  n_gpu_layers: 999    # 0 fuerza CPU pura; 999 fuerza todas las capas en GPU
  ctx_size: 8192
  threads: 8
  batch_size: 512
  port: 8080
  host: 0.0.0.0
  mmap: false
  mlock: false
  flash_attn: false
  jinja: false
  special: false
  defrag_thold: 0.1
  verbose: 2
  parallel: 4
  extra_args: []
  # Ejemplo de extra_args:
  # extra_args:
  #   - "--temp"
  #   - "0.7"

profiles:
  # Ejemplo para Gemma 4: requiere --jinja y --special
  # gemma-4-12b-it-Q4_K_M.gguf:
