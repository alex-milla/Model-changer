<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Changer - Llama.cpp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
        .model-card.active { border-color: #22c55e; background-color: #052e16; }
        .tab-active { border-bottom-color: #22c55e; color: #4ade80; }
        .tab-inactive { border-bottom-color: transparent; color: #9ca3af; }
        .tab-inactive:hover { color: #d1d5db; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <div class="max-w-6xl mx-auto p-6">
        <header class="mb-6 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold text-green-400">🦙 Model Changer</h1>
                <p class="text-gray-400 mt-1">Panel de control para Llama.cpp server</p>
            </div>
            <div class="text-right">
                <a id="llama-ui-link" href="#" target="_blank"
                   class="text-sm text-blue-400 hover:underline">Abrir llama-ui / server →</a>
                <div class="text-xs text-gray-500 mt-1">Backend en {{ config.llama_host }}:{{ config.llama_port }}</div>
            </div>
        </header>

        <!-- Pestañas -->
        <nav class="border-b border-gray-700 mb-6">
            <ul class="flex flex-wrap -mb-px">
                <li class="mr-2">
                    <button hx-get="/fragments/dashboard-page" hx-target="#tab-content" hx-swap="innerHTML"
                            onclick="setActiveTab(this)"
                            class="tab-active inline-block py-3 px-4 text-sm font-medium border-b-2 transition"
                            id="tab-dashboard">
                        📊 Dashboard
                    </button>
                </li>
                <li class="mr-2">
                    <button hx-get="/fragments/models-page" hx-target="#tab-content" hx-swap="innerHTML"
                            onclick="setActiveTab(this)"
                            class="tab-inactive inline-block py-3 px-4 text-sm font-medium border-b-2 transition"
                            id="tab-models">
                        🔄 Cambiar modelo
                    </button>
                </li>
                <li class="mr-2">
                    <button hx-get="/fragments/diagnostics-page" hx-target="#tab-content" hx-swap="innerHTML"
                            onclick="setActiveTab(this)"
                            class="tab-inactive inline-block py-3 px-4 text-sm font-medium border-b-2 transition"
                            id="tab-diagnostics">
                        🩺 Diagnóstico
                    </button>
                </li>
            </ul>
        </nav>

        <!-- Contenido de la pestaña activa -->
        <main id="tab-content" hx-get="/fragments/dashboard-page" hx-trigger="load" hx-swap="innerHTML">
            <div class="animate-pulse text-gray-400">Cargando dashboard...</div>
        </main>
    </div>

    <!-- Modal de configuración -->
    <div id="profile-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
        <div class="bg-gray-800 rounded-xl p-6 max-w-2xl w-full border border-gray-700 shadow-2xl">
            <div id="profile-modal-content">
                <div class="text-gray-400">Cargando configuración...</div>
            </div>
        </div>
    </div>

    <script>
        // Enlace al backend usando la IP/hostname desde la que se abre el panel
        document.getElementById('llama-ui-link').href = `http://${window.location.hostname}:{{ config.llama_port }}`;

        function setActiveTab(elt) {
            document.querySelectorAll('nav button').forEach(b => {
                b.classList.remove('tab-active');
                b.classList.add('tab-inactive');
            });
            elt.classList.remove('tab-inactive');
            elt.classList.add('tab-active');
        }

        // Cerrar modal al hacer clic fuera
        document.getElementById('profile-modal').addEventListener('click', function(evt) {
            if (evt.target === this) {
                this.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
